set -g mouse on
setw -g mode-keys vi
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# History
set-option -g history-limit 10000

unbind C-b
set -g prefix C-z
bind C-z send-prefix

# Fix ESC delay
set -gs escape-time 10

# {r}eload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux config file"

unbind Up
unbind Down
unbind Left
unbind Right

# Move panes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Rename window
bind ';' command-prompt -p "Session name:" "rename-session '%%'"

# Delete session
# bind-key X confirm-before -p 'Are you sure to delete the session?' kill-session -t '%%'

# Kill all
bind ^ confirm-before -p "Are you sure you want to remove all panes? y/n" "kill-pane -a"

# Split windows
unbind '"'
unbind %
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

# Plugin list
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'o0th/tmux-nova'

# Plugin configs
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left 
set -g @nova-nerdfonts-right 
set -g @nova-pane "#I#{?pane_in_mode,  #{pane_mode},}  #W"

# Execute plugins
run '~/.tmux/plugins/tpm/tpm'

source-file ~/.config/tmux/themes/gruvbox.conf
# source-file ~/.config/tmux/themes/everforest.conf
